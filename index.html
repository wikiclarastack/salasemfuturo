<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/webp" href="https://crimsonzerohub.xyz/img/logo/eclipselunar.webp"/>
    <title>Eclipse Lunar | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style/index.css"> </head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="logo-container">
            <h1 class="logo-text">Eclipse Lunar</h1>
            <p class="subtitle">Sua plataforma de estudos automatizada</p>
        </div>

        <div class="main-card">
            <div class="input-group">
                <label class="label-style"><i class="fa-solid fa-id-card"></i> RA</label>
                <div class="ra-row">
                    <div class="input-wrapper"><input type="text" id="ra" placeholder="Número" maxlength="9"></div>
                    <div class="input-wrapper"><input type="text" id="ra-digito" placeholder="D" maxlength="1"></div>
                    <div class="input-wrapper">
                        <select id="ra-uf">
                            <option value="SP" selected>SP</option>
                            <option value="RJ">RJ</option>
                            <option value="MG">MG</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label class="label-style"><i class="fa-solid fa-lock"></i> Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Digite sua senha">
                    <i class="fa-solid fa-eye-slash" id="togglePassword" style="cursor:pointer"></i>
                </div>
            </div>

            <button class="btn-primary" id="btnLogin">
                <span>Entrar</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>
    <script src="/main/index.js"></script> </body>
</html>
