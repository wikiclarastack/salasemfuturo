<!DOCTYPE html>
<html lang="pt-br" class="sidebar-pre-collapsed">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Eclipse Lunar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style/dashboard.css">
</head>
<body>

    <div id="overlay" onclick="closeSidebar()"></div>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <img src="https://crimsonzerohub.xyz/img/logo/eclipselunar.webp" alt="Logo" class="sidebar-logo">
            <span class="sidebar-title">Eclipse</span>
            <button class="sidebar-collapse-btn" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="home">
                <i class="fa-solid fa-house"></i> <span>Início</span>
            </a>
            <a href="#" class="nav-item" data-page="tarefas">
                <i class="fa-solid fa-list-check"></i> <span>Tarefas SP</span>
                <span class="nav-badge" id="nav-badge-tarefas" style="display:none">0</span>
            </a>
            <a href="#" class="nav-item" data-page="redacao">
                <i class="fa-solid fa-pen-nib"></i> <span>Redação</span>
            </a>
            <a href="#" class="nav-item" data-page="plataformas">
                <i class="fa-solid fa-grip"></i> <span>Plataformas</span>
            </a>
            <div class="nav-separator"></div>
            <a href="#" class="nav-item" onclick="doLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> <span>Sair</span>
            </a>
        </nav>
    </aside>

    <div id="main-wrap" class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 id="page-title">Dashboard</h2>
            </div>

            <div class="topbar-right">
                <div class="topbar-user" id="topbar-user" onclick="toggleUserMenu()">
                    <div class="user-avatar" id="topbar-avatar">U</div>
                    <span id="topbar-username">Carregando...</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                
                <div class="user-dropdown" id="user-dropdown">
                    <div class="dropdown-header">
                        <div class="user-avatar large" id="user-dropdown-avatar">U</div>
                        <div class="user-info">
                            <p id="user-dropdown-name">Nome Usuário</p>
                            <span id="user-dropdown-nick">@nick</span>
                        </div>
                    </div>
                    <div class="dropdown-body">
                        <a href="#" onclick="navigateTo('perfil')"><i class="fa-solid fa-user-gear"></i> Perfil</a>
                        <button onclick="doLogout()" class="btn-logout"><i class="fa-solid fa-power-off"></i> Sair</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="welcome-section">
                <div class="welcome-text">
                    <h1>Olá, <span id="greeting-name">estudante</span>! 👋</h1>
                    <p id="greeting-sub">Carregando informações da turma...</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card" id="card-pendencias" onclick="openPendenciasModal()">
                    <div class="skeleton" style="height:100px"></div>
                </div>
                <div class="stat-card" id="card-mensagens">
                    <div class="skeleton" style="height:100px"></div>
                </div>
                <div class="stat-card" id="card-faltas">
                    <div class="skeleton" style="height:100px"></div>
                </div>
                <div class="stat-card" id="card-freq">
                    <div class="skeleton" style="height:100px"></div>
                </div>
            </div>

            <div class="dashboard-sections">
                <section class="section-container">
                    <div class="section-header">
                        <h3>Plataformas Rápidas</h3>
                        <span class="turma-badge" id="plat-turma-label">--</span>
                    </div>
                    <div id="platforms-section" class="platforms-grid">
                        </div>
                </section>

                <aside class="section-container agenda-aside">
                    <h3>Agenda do Mês</h3>
                    <div id="agenda-section">
                        </div>
                </aside>
            </div>
        </main>
    </div>

    <div id="pendencias-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Minhas Pendências</h3>
                <button class="close-btn" onclick="closePendenciasModal()">&times;</button>
            </div>
            <div id="pendencias-list" class="pendencias-list">
                </div>
        </div>
    </div>

    <script src="/main/dashboard.js"></script>
</body>
</html>
